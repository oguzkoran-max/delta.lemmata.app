[theme]
primaryColor = "#0f6e56"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#31333f"
linkColor = "#0f6e56"
borderColor = "#e2e5e4"
showWidgetBorder = true
baseRadius = "small"
buttonRadius = "small"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"

[browser]
gatherUsageStats = false

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
runOnSave = false
maxUploadSize = 25

[client]
showErrorDetails = "none"
toolbarMode = "minimal"
