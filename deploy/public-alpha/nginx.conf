worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    access_log off;

    client_body_temp_path /tmp/client_temp 1 2;
    proxy_temp_path /tmp/proxy_temp 1 2;
    fastcgi_temp_path /tmp/fastcgi_temp 1 2;
    uwsgi_temp_path /tmp/uwsgi_temp 1 2;
    scgi_temp_path /tmp/scgi_temp 1 2;
    client_body_timeout 20s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 75s;

    limit_req_zone $binary_remote_addr zone=delta_requests:1m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=delta_connections:1m;
    limit_req_status 429;
    limit_conn_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $delta_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    upstream delta_application {
        server app:8501;
        keepalive 4;
    }

    server {
        listen 8080 default_server;
        server_name _;
        return 421;
    }

    server {
        listen 8080;
        server_name delta.lemmata.app;

        client_max_body_size 26m;
        limit_conn delta_connections 20;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self' blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location / {
            limit_req zone=delta_requests burst=60 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $delta_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 70s;
            proxy_read_timeout 75s;
            proxy_buffering off;
            proxy_request_buffering on;
            proxy_max_temp_file_size 0;
            proxy_pass http://delta_application;
        }
    }
}
