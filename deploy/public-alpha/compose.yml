name: delta-public-alpha

services:
  app:
    image: ${DELTA_IMAGE:?Set DELTA_IMAGE to an immutable Delta image reference}
    platform: linux/amd64
    user: "10001:10001"
    init: true
    read_only: true
    env_file:
      - ${DELTA_RUNTIME_ENV_FILE:?Set DELTA_RUNTIME_ENV_FILE to the private secret file}
    environment:
      DELTA_BUILD_ID: ${DELTA_BUILD_ID:?Set DELTA_BUILD_ID to the source commit}
      DELTA_ENV: production
      DELTA_EXTERNAL_NETWORK: disabled
      DELTA_LOG_LEVEL: INFO
      DELTA_RUNTIME_ROOT: /var/lib/delta/runtime
    expose:
      - "8501"
    networks:
      - delta_internal
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m,mode=1777,uid=10001,gid=10001
      - /var/lib/delta/runtime:rw,nosuid,nodev,noexec,size=512m,mode=0700,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: "1.50"
    mem_limit: 1536m
    memswap_limit: 1536m
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    restart: "on-failure:3"
    stop_grace_period: 75s
    healthcheck:
      test:
        - CMD
        - /opt/delta/.venv/bin/python
        - -c
        - "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2); assert r.status == 200 and r.read(16).strip() == b'ok'"
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 6
    logging:
      driver: local
      options:
        max-size: 1m
        max-file: "2"
    labels:
      app.delta-lemmata.component: application
      app.delta-lemmata.release-stage: public-alpha
      app.delta-lemmata.storage: ephemeral-only

  gateway:
    image: nginxinc/nginx-unprivileged:1.30.3-alpine-slim@sha256:3b24c4bfb2b9f60359b1475605ca1c8ed6e4963eb8369c6835be4d96bdb3ea81
    platform: linux/amd64
    user: "101:101"
    read_only: true
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /tmp/client_temp /tmp/proxy_temp
        exec nginx -c /etc/nginx/nginx.conf -g 'daemon off;'
    depends_on:
      app:
        condition: service_healthy
        restart: true
    ports:
      - "127.0.0.1:8502:8080"
    networks:
      - delta_internal
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=32m,mode=0700,uid=101,gid=101
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    cpus: "0.25"
    mem_limit: 128m
    memswap_limit: 128m
    ulimits:
      nofile:
        soft: 512
        hard: 1024
    restart: "on-failure:3"
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null --header='Host: delta.lemmata.app' http://127.0.0.1:8080/_stcore/health"
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
    logging:
      driver: local
      options:
        max-size: 1m
        max-file: "2"
    labels:
      app.delta-lemmata.component: gateway
      app.delta-lemmata.release-stage: public-alpha

networks:
  delta_internal:
    internal: true
    attachable: false
    labels:
      app.delta-lemmata.boundary: private-no-default-egress
