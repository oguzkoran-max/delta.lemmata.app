name: P005 Linux evidence capture

on:
  push:
    branches:
      - codex/p005-evidence-capture

permissions:
  contents: write

concurrency:
  group: p005-linux-evidence-capture
  cancel-in-progress: false

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13.9"
          enable-cache: false

      - name: Install pinned R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Restore locked environments
        run: ./scripts/bootstrap.sh

      - name: Verify exact source
        run: ./scripts/verify.sh

      - name: Generate path-neutral evidence
        run: ./scripts/generate_evidence.sh

      - name: Commit checksum-bound Linux evidence
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -eu
          short_sha=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
          destination="provenance/evidence/P005/ci-supply-chain-$short_sha"
          test ! -e "$destination"
          test ! -e "$destination.sha256"
          mkdir -p "$destination"
          cp provenance/evidence/P001/generated/* "$destination/"
          .tools/uv/bin/uv run python scripts/validate_generated_evidence.py \
            "$destination" --write-manifest "$destination.sha256"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$destination" "$destination.sha256"
          git commit -m "P005: capture Linux supply-chain evidence"
          git push origin HEAD:codex/p005-evidence-capture
