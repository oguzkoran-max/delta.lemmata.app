name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13.9"
          enable-cache: false

      - name: Install pinned R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Prepare fixed R worker cache
        run: sudo install -d -m 0755 -o "$(id -u)" -g "$(id -g)" /opt/renv/cache

      - name: Restore locked environments
        env:
          RENV_PATHS_CACHE: /opt/renv/cache
        run: ./scripts/bootstrap.sh

      - name: Verify source, metadata, schemas, and records
        run: ./scripts/verify.sh

      - name: Build and verify installed wheel resources
        run: |
          uv build --wheel --out-dir /tmp/delta-wheel
          uv venv /tmp/delta-wheel-venv
          uv pip install --python /tmp/delta-wheel-venv/bin/python --no-deps /tmp/delta-wheel/*.whl
          /tmp/delta-wheel-venv/bin/python - <<'PY'
          import hashlib
          from importlib.resources import files

          fonts = files("delta_lemmata").joinpath("data", "fonts")
          font = fonts.joinpath("InterVariable.woff2").read_bytes()
          assert hashlib.sha256(font).hexdigest() == (
              "693b77d4f32ee9b8bfc995589b5fad5e99adf2832738661f5402f9978429a8e3"
          )
          assert "SIL OPEN FONT LICENSE" in fonts.joinpath("LICENSE-Inter.txt").read_text()
          assert "InterVariable.woff2" in fonts.joinpath("VENDORED.md").read_text()
          PY

      - name: Install Chromium for the real-workflow browser gate
        run: uv run playwright install --with-deps chromium

      - name: Run upload-to-public-result browser gate
        run: >-
          uv run python scripts/browser_audit_p009.py
          --output /tmp/delta-p009-browser-audit

      - name: Print browser-gate evidence
        if: always()
        run: |
          if [[ -f /tmp/delta-p009-browser-audit/browser-audit.json ]]; then
            echo "DELTA_BROWSER_AUDIT_JSON_BEGIN"
            cat /tmp/delta-p009-browser-audit/browser-audit.json
            echo "DELTA_BROWSER_AUDIT_JSON_END"
            echo "DELTA_BROWSER_AUDIT_SHA256_BEGIN"
            cd /tmp/delta-p009-browser-audit
            sha256sum browser-audit.json
            echo "DELTA_BROWSER_AUDIT_SHA256_END"
          else
            echo "browser-audit.json was not produced; inspect the preceding traceback."
          fi

      - name: Generate and validate SBOM and audit evidence
        run: ./scripts/generate_evidence.sh

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13.9"
          enable-cache: false

      - name: Restore locked browser-audit environment
        run: uv sync --frozen

      - name: Install Chromium for the gateway browser gate
        run: uv run playwright install --with-deps chromium

      - name: Build canonical Linux amd64 image
        run: |
          docker build --platform linux/amd64 --build-arg DELTA_BUILD_ID="$GITHUB_SHA" --file containers/Dockerfile --iidfile /tmp/delta-image-id .
          printf 'DELTA_IMAGE=%s\n' "$(cat /tmp/delta-image-id)" >> "$GITHUB_ENV"
          printf 'DELTA_BUILD_ID=%s\n' "$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Create private runtime secrets
        run: |
          install -d -m 0700 /tmp/delta-p014-secrets
          uv run python scripts/generate_p014_secrets.py --output /tmp/delta-p014-secrets/runtime.env
          printf 'DELTA_RUNTIME_ENV_FILE=%s\n' /tmp/delta-p014-secrets/runtime.env >> "$GITHUB_ENV"

      - name: Run hardened public-alpha stack gate
        env:
          DELTA_P014_BROWSER_AUDIT: "1"
        run: ./scripts/run_p014_runtime_gate.sh
