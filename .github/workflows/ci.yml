name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13.9"
          enable-cache: false

      - name: Install pinned R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Prepare fixed R worker cache
        run: sudo install -d -m 0755 -o "$(id -u)" -g "$(id -g)" /opt/renv/cache

      - name: Restore locked environments
        env:
          RENV_PATHS_CACHE: /opt/renv/cache
        run: ./scripts/bootstrap.sh

      - name: Verify source, metadata, schemas, and records
        run: ./scripts/verify.sh

      - name: Install Chromium for the real-workflow browser gate
        run: uv run playwright install --with-deps chromium

      - name: Run upload-to-public-result browser gate
        run: >-
          uv run python scripts/browser_audit_p009.py
          --output /tmp/delta-p009-browser-audit

      - name: Print browser-gate evidence
        if: always()
        run: |
          if [[ -f /tmp/delta-p009-browser-audit/browser-audit.json ]]; then
            python -m json.tool /tmp/delta-p009-browser-audit/browser-audit.json
          else
            echo "browser-audit.json was not produced; inspect the preceding traceback."
          fi

      - name: Generate and validate SBOM and audit evidence
        run: ./scripts/generate_evidence.sh

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build canonical Linux amd64 image
        run: docker build --platform linux/amd64 --file containers/Dockerfile .
